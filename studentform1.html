
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>

<header class="topbar">

    <nav>

    </nav>

</header>

<section class="form-section">

    <div class="form-card">

        <h2>Student Registration Form - Part 1</h2>

        <p class="form-text">
            Personal Information Details
        </p>

        <label>Full Name</label>
        <input type="text" placeholder="Enter Full Name">

        <label>Roll Number</label>
        <input type="text" placeholder="Enter Roll Number">

        <label>Enrollment Number</label>
        <input type="text" placeholder="Enter Enrollment Number">

        <label>Mobile Number</label>
        <input type="tel" placeholder="Enter Mobile Number">

        <label>Email Address</label>
        <input type="email" placeholder="Enter Email Address">

        <label>Branch</label>
        <select>
            <option>Select Branch</option>
            <option>Computer Engineering</option>
            <option>Information Technology</option>
            <option>Mechanical Engineering</option>
            <option>Civil Engineering</option>
            <option>Electrical Engineering</option>
        </select>

        <label>Semester</label>
        <select>
            <option>Select Semester</option>
            <option>Semester 1</option>
            <option>Semester 2</option>
            <option>Semester 3</option>
            <option>Semester 4</option>
            <option>Semester 5</option>
            <option>Semester 6</option>
        </select>

        <label>Date of Birth</label>
        <input type="date">

        <label>Gender</label>
        <select>
            <option>Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <label>Blood Group</label>
        <select>
            <option>Select Blood Group</option>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>AB+</option>
            <option>AB-</option>
            <option>O+</option>
            <option>O-</option>
        </select>

        <label>Address</label>
        <textarea rows="4" placeholder="Enter Address"></textarea>

        <label>City</label>
        <input type="text" placeholder="Enter City">

        <label>State</label>
        <input type="text" placeholder="Enter State">

        <label>Pincode</label>
        <input type="text" placeholder="Enter Pincode">

        <div class="button-group">

            <a href="design.html" class="back-btn">
                ← Back
            </a>

            <a href="studentform2.html" class="btn">
                Next →
            </a>

        </div>

    </div>

</section>

<footer>
    <p>RAM'S POLYTECHNIC STUDENT PORTAL</p>
</footer>
