<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI Payment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
    <h1>UPI Payment</h1>
</header>

<section class="form-section">

    <div class="form-card">

        <h2>Pay Using UPI</h2>

        <div class="qr-box">
            <img src="images/qr.jpg" alt="qr">
        </div>

        <label>UPI ID</label>
        <input type="text" placeholder="example@upi">

        <label>Amount</label>
        <input type="number" value="500">

        <a href="success.html" class="btn">
            Verify Payment
        </a>
        <a href="payment.html" class="back-btn">← Back</a>

    </div>

</section>

</body>
</html>
