<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Payment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
    <h1>Card Payment</h1>
</header>

<section class="form-section">

    <div class="form-card">

        <h2>Pay Using Card</h2>

        <label>Card Holder Name</label>
        <input type="text">

        <label>Card Number</label>
        <input type="text">

        <label>Expiry Date</label>
        <input type="month">

        <label>CVV</label>
        <input type="password">

        <label>Amount</label>
        <input type="number" value="500">

        <a href="success.html" class="btn">
            Pay Now
        </a>

    </div>

</section>

</body>
</html>
